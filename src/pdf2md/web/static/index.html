<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF2MD · 智能文档转换</title>
  <!-- 内联 SVG favicon，无需额外文件 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235048e5'/%3E%3Ctext x='3' y='13' font-size='8.5' font-family='Arial%2Csans-serif' font-weight='900' fill='%23ffffff'%3EPDF%3C/text%3E%3Ctext x='3' y='23' font-size='8' font-family='Arial%2Csans-serif' font-weight='700' fill='%23c7d2fe'%3E%E2%86%92 MD%3C/text%3E%3Crect x='3' y='26' width='26' height='1.5' rx='1' fill='%23818cf8'/%3E%3C/svg%3E">
  <!-- 本地资源，不依赖 CDN，避免浏览器跟踪防护拦截 -->
  <link href="/vendor/bi/bootstrap-icons.min.css" rel="stylesheet">
  <script src="/vendor/marked.min.js"></script>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #f5f6fa;
    --s1:     #ffffff;
    --s2:     #f0f1f7;
    --s3:     #e4e6f0;
    --bd:     #d0d4e8;
    --acc:    #5048e5;
    --acc2:   rgba(80,72,229,.09);
    --green:  #16a34a;
    --red:    #dc2626;
    --blue:   #2563eb;
    --text:   #1e2132;
    --muted:  #6b7280;
    --mono:   'JetBrains Mono','Fira Code','Cascadia Code','Consolas',monospace;
    --r:      10px;
    --hdr:    52px;
    --sb:     268px;
    --img:    256px;
  }

  html, body { height: 100%; overflow: hidden; }
  body { background:var(--bg); color:var(--text);
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex; flex-direction:column; }

  /* ── HEADER ── */
  header {
    height: var(--hdr); flex-shrink: 0;
    background: var(--s1); border-bottom: 1px solid var(--bd);
    display: flex; align-items: center; padding: 0 1rem; gap: .7rem; z-index:50;
  }
  .logo { display:flex; align-items:center; gap:.45rem; font-weight:700; font-size:.95rem; flex-shrink:0; }
  .logo-box { width:26px; height:26px; background:var(--acc); border-radius:7px;
               display:grid; place-items:center; font-size:.78rem; }
  .h-sep { width:1px; height:18px; background:var(--bd); flex-shrink:0; }
  #task-title { font-size:.84rem; font-weight:500; flex:1; min-width:0;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #task-title.empty { color:var(--muted); }
  .h-acts { display:flex; align-items:center; gap:.45rem; flex-shrink:0; }

  /* badges */
  .badge { display:inline-flex; align-items:center; gap:.28rem;
           padding:.2rem .6rem; border-radius:20px; font-size:.7rem; font-weight:600; white-space:nowrap; }
  .bd-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
  .s-pending    { background:#f3f4f6;            color:#6b7280; }
  .s-processing { background:#dbeafe;            color:#1d4ed8; }
  .s-completed  { background:#dcfce7;            color:#15803d; }
  .s-failed     { background:#fee2e2;            color:#dc2626; }
  .s-processing .bd-dot { animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .hbtn { background:none; border:1px solid var(--bd); color:var(--muted);
          border-radius:7px; padding:.28rem .6rem; font-size:.78rem; cursor:pointer;
          display:flex; align-items:center; gap:.3rem; text-decoration:none;
          transition:border-color .15s,color .15s; }
  .hbtn:hover { border-color:var(--acc); color:var(--text); }
  .hbtn.acc { background:var(--acc); border-color:var(--acc); color:#fff; }
  .hbtn.acc:hover { opacity:.85; }

  /* ── PROGRESS BAR ── */
  .prog-bar { height:2px; flex-shrink:0; background:var(--bd); }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--acc),#a78bfa);
               transition:width .4s ease; }

  /* ── WORKSPACE ── */
  .workspace { display:flex; flex:1; min-height:0; }

  /* ── IMAGES PANEL ── */
  .img-panel { width:var(--img); flex-shrink:0; display:flex; flex-direction:column;
               border-right:1px solid var(--bd); background:var(--s1); overflow:hidden; }
  .panel-hdr { height:38px; flex-shrink:0; display:flex; align-items:center;
               justify-content:space-between; padding:0 .85rem;
               border-bottom:1px solid var(--bd); font-size:.7rem; font-weight:700;
               color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .img-list { flex:1; overflow-y:auto; padding:.5rem; }
  .img-item { border-radius:7px; overflow:hidden; margin-bottom:.55rem;
              border:1px solid var(--bd); cursor:pointer; position:relative;
              background:var(--s2); transition:border-color .15s; }
  .img-item:hover { border-color:var(--acc); }
  .img-item img { width:100%; display:block; }
  .img-eye { position:absolute; top:.4rem; right:.4rem;
             width:26px; height:26px; border-radius:50%;
             background:rgba(0,0,0,.52); border:none; color:#fff;
             display:flex; align-items:center; justify-content:center;
             cursor:pointer; font-size:.82rem;
             opacity:0; transition:opacity .15s; }
  .img-item:hover .img-eye { opacity:1; }
  .img-eye:hover { background:rgba(80,72,229,.85); }

  /* ── LIGHTBOX ── */
  #lightbox { display:none; position:fixed; inset:0; z-index:2000;
              background:rgba(0,0,0,.88); flex-direction:column;
              align-items:center; justify-content:center; }
  #lightbox.show { display:flex; }
  #lb-close { position:absolute; top:1rem; right:1.2rem;
              background:rgba(255,255,255,.12); border:none; color:#fff;
              width:36px; height:36px; border-radius:50%; font-size:1.1rem;
              cursor:pointer; display:grid; place-items:center;
              transition:background .15s; }
  #lb-close:hover { background:rgba(255,255,255,.25); }
  #lb-img-wrap { flex:1; min-height:0; display:flex; align-items:center;
                 justify-content:center; padding:3rem 4rem; width:100%; }
  #lb-img { max-width:100%; max-height:100%; object-fit:contain;
            border-radius:6px; box-shadow:0 8px 40px rgba(0,0,0,.6);
            user-select:none; }
  #lb-footer { height:52px; flex-shrink:0; display:flex; align-items:center;
               gap:1.2rem; color:#fff; font-size:.88rem; }
  .lb-arrow { background:rgba(255,255,255,.12); border:none; color:#fff;
              width:36px; height:36px; border-radius:50%; font-size:1rem;
              cursor:pointer; display:grid; place-items:center;
              transition:background .15s; }
  .lb-arrow:hover { background:rgba(80,72,229,.8); }
  .lb-arrow:disabled { opacity:.25; cursor:default; background:none; }
  #lb-counter { min-width:80px; text-align:center; color:rgba(255,255,255,.75); font-size:.82rem; }
  .img-pg { position:absolute; bottom:0; left:0; right:0;
            background:linear-gradient(transparent,rgba(0,0,0,.72));
            padding:.3rem .5rem; font-size:.67rem; color:#fff; text-align:right; }
  .img-empty { padding:2.5rem 1rem; text-align:center; color:var(--muted); font-size:.82rem; line-height:1.7; }
  .img-empty i { font-size:2rem; display:block; margin-bottom:.6rem; opacity:.3; }
  .img-spin { display:flex; align-items:center; justify-content:center;
              gap:.5rem; padding:2rem 1rem; color:var(--muted); font-size:.82rem; }
  .spin { width:14px; height:14px; border:2px solid var(--bd);
          border-top-color:var(--acc); border-radius:50%; animation:rot .7s linear infinite; }
  @keyframes rot { to{transform:rotate(360deg)} }

  /* ── CONTENT PANEL ── */
  .content-panel { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; }
  .tab-bar { height:38px; flex-shrink:0; display:flex; align-items:stretch;
             background:var(--s1); border-bottom:1px solid var(--bd); padding:0 .6rem; gap:.15rem; }
  .tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted);
         cursor:pointer; padding:0 .8rem; font-size:.8rem; font-weight:500;
         display:flex; align-items:center; gap:.35rem; transition:color .15s,border-color .15s; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--acc); border-bottom-color:var(--acc); }
  .tab-dot { width:6px; height:6px; border-radius:50%; background:var(--blue); animation:blink 1s infinite; }

  .pane { flex:1; overflow-y:auto; display:none; flex-direction:column; }
  .pane.active { display:flex; }

  /* welcome */
  .welcome { flex:1; display:flex; flex-direction:column; align-items:center;
             justify-content:center; gap:.75rem; padding:2rem; text-align:center; }
  .welcome i { font-size:3rem; opacity:.15; }
  .welcome h2 { font-size:1rem; font-weight:600; }
  .welcome p { font-size:.83rem; color:var(--muted); max-width:260px; line-height:1.65; }

  /* ── LOG ── */
  #log-pane { background:var(--bg); }
  #log-entries { padding:.6rem .8rem; font-family:var(--mono); font-size:.76rem; line-height:1.65; }
  .le { margin-bottom:.22rem; word-break:break-word; }
  .lts { color:#9ba3b8; font-size:.68rem; margin-right:.35rem; user-select:none; }
  .l-start { color:var(--muted); }
  .l-think { color:#374151; }
  .l-think .lbl { color:#6b7280; margin-right:.3rem; }
  .l-call { background:#eff6ff; border-left:2px solid #2563eb;
            padding:.28rem .6rem; border-radius:0 4px 4px 0; margin:.3rem 0; }
  .l-call .fn  { color:#1d4ed8; font-weight:700; margin-right:.35rem; font-size:.7rem; }
  .l-call .nm  { color:#2563eb; }
  .l-call pre  { color:#374151; margin-top:.2rem; font-size:.7rem; white-space:pre-wrap; word-break:break-all; max-height:120px; overflow-y:auto; }
  .l-ret  { background:#f0fdf4; border-left:2px solid #16a34a;
            padding:.28rem .6rem; border-radius:0 4px 4px 0; margin:.3rem 0; }
  .l-ret .fn   { color:#15803d; font-weight:700; margin-right:.35rem; font-size:.7rem; }
  .l-ret .nm   { color:#16a34a; }
  .l-ret pre   { color:#374151; margin-top:.2rem; font-size:.7rem; white-space:pre-wrap; word-break:break-all; max-height:120px; overflow-y:auto; }
  .l-done { background:#dcfce7; border-left:2px solid var(--green);
            padding:.35rem .7rem; border-radius:0 4px 4px 0;
            color:#15803d; font-weight:600; margin:.35rem 0; }
  .l-err  { background:#fef2f2; border-left:2px solid var(--red);
            padding:.35rem .7rem; border-radius:0 4px 4px 0; color:#dc2626; margin:.35rem 0; }

  /* ── PREVIEW ── */
  #preview-pane { background:var(--bg); }
  .md-body { padding:1.5rem 2rem; max-width:860px; margin:0 auto; padding-bottom:3rem; }
  .md-body h1,.md-body h2,.md-body h3 { color:var(--text); margin:1.2em 0 .5em; line-height:1.3; }
  .md-body h1 { font-size:1.5em; border-bottom:1px solid var(--bd); padding-bottom:.3em; }
  .md-body h2 { font-size:1.2em; border-bottom:1px solid var(--bd); padding-bottom:.2em; }
  .md-body p  { margin:.55em 0; color:#374151; line-height:1.75; }
  .md-body a  { color:var(--acc); }
  .md-body code { background:var(--s3); padding:.12em .38em; border-radius:4px;
                  font-family:var(--mono); font-size:.83em; color:#b45309; }
  .md-body pre  { background:#1e2132; border:1px solid var(--bd); border-radius:8px;
                  padding:1rem; overflow-x:auto; margin:.7em 0; }
  .md-body pre code { background:none; padding:0; color:#e2e8f0; font-size:.85em; }
  .md-body blockquote { border-left:3px solid var(--acc); padding:.4rem .9rem;
                        color:var(--muted); background:var(--s2); border-radius:0 6px 6px 0; margin:.6em 0; }
  .md-body table { width:100%; border-collapse:collapse; margin:.7em 0; font-size:.88em; }
  .md-body th,.md-body td { border:1px solid var(--bd); padding:.4rem .7rem; }
  .md-body th { background:var(--s3); color:var(--text); font-weight:600; }
  .md-body tr:hover td { background:rgba(0,0,0,.02); }
  .md-body hr { border:none; border-top:1px solid var(--bd); margin:1.2em 0; }
  .md-body ul,.md-body ol { padding-left:1.5em; margin:.5em 0; }
  .md-body li { margin:.2em 0; color:#374151; }
  .md-body img { max-width:100%; border-radius:6px; }
  .md-empty { flex:1; display:flex; flex-direction:column; align-items:center;
              justify-content:center; gap:.6rem; color:var(--muted); font-size:.84rem; }
  .md-empty i { font-size:2rem; opacity:.25; }

  /* ── SIDEBAR ── */
  .sidebar { width:var(--sb); flex-shrink:0; display:flex; flex-direction:column;
             border-left:1px solid var(--bd); background:var(--s1);
             overflow:hidden; transition:width .22s ease; }
  .sidebar.closed { width:0; }
  .sb-inner { width:var(--sb); display:flex; flex-direction:column; flex:1; overflow-y:auto; }
  .sb-sec { padding:.8rem; border-bottom:1px solid var(--bd); }
  .sb-sec:last-child { flex:1; overflow-y:auto; display:flex; flex-direction:column; border-bottom:none; }
  .sb-title { font-size:.7rem; font-weight:700; color:var(--muted); text-transform:uppercase;
              letter-spacing:.07em; margin-bottom:.6rem;
              display:flex; align-items:center; justify-content:space-between; }

  /* upload */
  .upzone { border:2px dashed var(--bd); border-radius:8px; padding:1.1rem .75rem;
            text-align:center; cursor:pointer; transition:border-color .2s,background .2s; }
  .upzone:hover,.upzone.over { border-color:var(--acc); background:var(--acc2); }
  .upzone.busy { opacity:.55; pointer-events:none; }
  .upzone input { display:none; }
  .uz-icon { font-size:1.4rem; color:var(--muted); margin-bottom:.3rem; display:block; transition:color .2s; }
  .upzone:hover .uz-icon,.upzone.over .uz-icon { color:var(--acc); }
  .uz-txt { font-size:.76rem; color:var(--muted); line-height:1.5; }
  .uz-txt strong { color:var(--text); display:block; margin-bottom:.12rem; }
  .up-prog { margin-top:.6rem; display:none; }
  .up-track { height:3px; background:var(--bd); border-radius:3px; overflow:hidden; }
  .up-fill { height:100%; background:var(--acc); animation:slide 1.1s infinite linear; }
  @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
  .up-msg { font-size:.7rem; color:var(--muted); margin-top:.3rem; }

  /* history */
  .hist-list { display:flex; flex-direction:column; gap:.35rem; padding-bottom:.5rem; }
  .hist-item { padding:.55rem .7rem; border-radius:7px; cursor:pointer;
               border:1px solid transparent; transition:background .15s,border-color .15s;
               display:flex; align-items:center; gap:.55rem; }
  .hist-item:hover  { background:var(--s3); border-color:var(--bd); }
  .hist-item.active { background:var(--acc2); border-color:var(--acc); }
  .hi-icon { color:#ef4444; flex-shrink:0; font-size:.9rem; }
  .hi-body { flex:1; min-width:0; }
  .hi-name { font-size:.77rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hi-meta { font-size:.67rem; color:var(--muted); margin-top:.1rem; display:flex; align-items:center; gap:.3rem; flex-wrap:wrap; }
  .hi-del  { background:none; border:none; color:var(--muted); cursor:pointer;
             padding:.15rem; border-radius:4px; opacity:0; transition:opacity .15s; font-size:.8rem; }
  .hist-item:hover .hi-del { opacity:1; }
  .hi-del:hover { color:var(--red); }
  .hist-empty { font-size:.77rem; color:var(--muted); text-align:center; padding:1.5rem .5rem; line-height:1.7; }

  /* ── MODAL ── */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
             z-index:999; place-items:center; }
  .overlay.show { display:grid; }
  .modal-box { background:var(--s2); border:1px solid var(--bd); border-radius:var(--r);
               padding:1.5rem; max-width:390px; width:90%; }
  .modal-box h3 { font-size:.93rem; font-weight:600; margin-bottom:.55rem; }
  .modal-box p  { font-size:.82rem; color:var(--muted); margin-bottom:1.1rem; line-height:1.65; }
  .modal-btns { display:flex; justify-content:flex-end; gap:.55rem; }
  .btn-cancel { background:none; border:1px solid var(--bd); color:var(--muted);
                border-radius:7px; padding:.38rem .85rem; font-size:.81rem; cursor:pointer; }
  .btn-cancel:hover { color:var(--text); }
  .btn-del { background:var(--red); border:none; color:#fff;
             border-radius:7px; padding:.38rem .85rem; font-size:.81rem; cursor:pointer; font-weight:500; }
  .btn-del:hover { opacity:.85; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:1.2rem; right:1.2rem; background:var(--s3);
           border:1px solid var(--bd); border-radius:9px; padding:.6rem 1rem;
           font-size:.82rem; color:var(--text); display:flex; align-items:center; gap:.5rem;
           z-index:9999; opacity:0; transform:translateY(6px);
           transition:opacity .2s,transform .2s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.err  { border-color:var(--red); color:#dc2626; }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--bd); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-box"><i class="bi bi-file-earmark-pdf-fill"></i></span>
    PDF2MD
  </div>
  <div class="h-sep"></div>
  <div id="task-title" class="empty">选择或上传 PDF 开始转换</div>
  <div class="h-acts">
    <span id="hdr-badge"></span>
    <a id="dl-btn" class="hbtn acc" style="display:none" download>
      <i class="bi bi-download"></i> 下载
    </a>
    <button class="hbtn" id="sb-toggle" onclick="toggleSidebar()" title="切换侧边栏">
      <i class="bi bi-layout-sidebar-reverse"></i>
    </button>
  </div>
</header>

<!-- CONVERSION PROGRESS -->
<div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- LEFT: PDF Images -->
  <div class="img-panel">
    <div class="panel-hdr">
      <span><i class="bi bi-images" style="margin-right:.3rem"></i>页面图像</span>
      <span id="img-count"></span>
    </div>
    <div class="img-list" id="img-list">
      <div class="img-empty">
        <i class="bi bi-file-earmark-image"></i>
        从右侧上传或选择<br>PDF 文件
      </div>
    </div>
  </div>

  <!-- CENTER: Log / Preview -->
  <div class="content-panel">
    <div class="tab-bar">
      <button class="tab active" id="tab-log" onclick="setTab('log')">
        <i class="bi bi-terminal"></i> 日志
        <span class="tab-dot" id="log-dot" style="display:none"></span>
      </button>
      <button class="tab" id="tab-preview" onclick="setTab('preview')">
        <i class="bi bi-markdown"></i> 预览
      </button>
    </div>

    <!-- Log pane: welcome + entries are siblings, not nested -->
    <div class="pane active" id="log-pane">
      <div class="welcome" id="log-welcome">
        <i class="bi bi-terminal"></i>
        <h2>处理日志</h2>
        <p>上传 PDF 后，这里实时显示 Agent 的思考过程和工具调用</p>
      </div>
      <div id="log-entries"></div>
    </div>

    <!-- Preview pane -->
    <div class="pane" id="preview-pane">
      <div class="md-empty" id="preview-empty">
        <i class="bi bi-markdown"></i>
        <span>转换完成后可在此预览 Markdown</span>
      </div>
      <div class="md-body" id="md-body" style="display:none"></div>
    </div>
  </div>

  <!-- RIGHT: Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sb-inner">

      <!-- Upload -->
      <div class="sb-sec">
        <div class="sb-title">上传文件</div>
        <div class="upzone" id="upzone">
          <input type="file" id="file-input" accept=".pdf">
          <i class="bi bi-cloud-arrow-up uz-icon"></i>
          <div class="uz-txt">
            <strong>拖拽或点击选择 PDF</strong>
            仅支持 .pdf 格式
          </div>
        </div>
        <div class="up-prog" id="up-prog">
          <div class="up-track"><div class="up-fill"></div></div>
          <div class="up-msg" id="up-msg">上传中...</div>
        </div>
      </div>

      <!-- History -->
      <div class="sb-sec">
        <div class="sb-title">
          <span><i class="bi bi-clock-history" style="margin-right:.3rem"></i>任务历史</span>
          <button class="hbtn" style="padding:.12rem .4rem;font-size:.7rem" onclick="loadHistory()">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
        <div class="hist-list" id="hist-list">
          <div class="hist-empty">暂无任务</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()" title="关闭 (ESC)">
    <i class="bi bi-x-lg"></i>
  </button>
  <div id="lb-img-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <div id="lb-footer">
    <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1)" title="上一页 (←)">
      <i class="bi bi-chevron-left"></i>
    </button>
    <span id="lb-counter"></span>
    <button class="lb-arrow" id="lb-next" onclick="lbNav(1)" title="下一页 (→)">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>
</div>

<!-- Delete modal -->
<div class="overlay" id="del-overlay">
  <div class="modal-box">
    <h3><i class="bi bi-exclamation-triangle" style="color:var(--red);margin-right:.4rem"></i>确认删除</h3>
    <p>删除后，PDF 和转换结果将一并移除，无法恢复。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-del" id="del-confirm">删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────
let currentId   = null;   // currently viewed task id
let currentTask = null;   // task object
let sseSource   = null;   // EventSource
let autoScroll  = true;
let thinkEl     = null;   // accumulates streaming thinking tokens
let totalPages  = 0;
let donePages   = 0;
let sbOpen      = true;
let deleteTarget= null;
let lbImages    = [];   // current image filenames for lightbox
let lbIndex     = 0;    // current lightbox page index

// ── Helpers ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtJson(v) {
  try { return JSON.stringify(typeof v==='string'?JSON.parse(v):v,null,2); } catch { return String(v); }
}
function fmtTs(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function timeAgo(iso) {
  const d = Date.now() - new Date(iso);
  if (d < 60000)    return '刚刚';
  if (d < 3600000)  return Math.floor(d/60000)+'分钟前';
  if (d < 86400000) return Math.floor(d/3600000)+'小时前';
  return new Date(iso).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
}
function mkBadge(status) {
  const m = { pending:{l:'等待中',c:'s-pending'}, processing:{l:'处理中',c:'s-processing'},
              completed:{l:'已完成',c:'s-completed'}, failed:{l:'失败',c:'s-failed'} };
  const s = m[status] || {l:status, c:'s-pending'};
  return `<span class="badge ${s.c}"><span class="bd-dot"></span>${s.l}</span>`;
}
function showToast(msg, err=false) {
  const t = $('toast');
  t.innerHTML = `<i class="bi bi-${err?'x-circle':'check-circle'}"></i> ${msg}`;
  t.className = 'toast show' + (err?' err':'');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className='toast', 2800);
}

// ── Sidebar ────────────────────────────────────────────────────────────
function toggleSidebar() {
  sbOpen = !sbOpen;
  $('sidebar').classList.toggle('closed', !sbOpen);
  $('sb-toggle').querySelector('i').className =
    sbOpen ? 'bi bi-layout-sidebar-reverse' : 'bi bi-layout-sidebar';
}

// ── Tabs ───────────────────────────────────────────────────────────────
function setTab(tab) {
  $('tab-log').classList.toggle('active', tab==='log');
  $('tab-preview').classList.toggle('active', tab==='preview');
  $('log-pane').classList.toggle('active', tab==='log');
  $('preview-pane').classList.toggle('active', tab==='preview');
  if (tab==='preview' && currentId && currentTask?.status==='completed') {
    renderPreview();
  }
}

// ── Load task (main entry) ─────────────────────────────────────────────
async function loadTask(id) {
  // Disconnect existing SSE
  if (sseSource) { sseSource.close(); sseSource = null; }

  currentId = id;
  totalPages = 0;
  donePages  = 0;
  thinkEl    = null;
  autoScroll = true;

  // Reset log area — only clear entries, keep welcome element hidden
  $('log-entries').innerHTML = '';
  $('log-welcome').style.display = 'none';

  // Reset preview
  $('md-body').style.display = 'none';
  $('md-body').innerHTML = '';
  $('preview-empty').style.display = 'flex';

  // Reset progress & images
  $('prog-fill').style.width = '0%';
  renderImages('loading');

  // Push URL state
  const u = new URL(window.location);
  u.searchParams.set('id', id);
  window.history.pushState({id}, '', u);

  // Fetch task info
  const resp = await fetch(`/api/tasks/${id}`);
  if (!resp.ok) {
    // Task not found (e.g. deleted) — clear URL and reset to welcome state
    window.history.replaceState({}, '', '/');
    currentId = null; currentTask = null;
    $('task-title').textContent = '选择或上传 PDF 开始转换';
    $('task-title').classList.add('empty');
    $('hdr-badge').innerHTML = '';
    $('dl-btn').style.display = 'none';
    $('log-entries').innerHTML = '';
    $('log-welcome').style.display = 'flex';
    $('prog-fill').style.width = '0%';
    renderImages('empty');
    showToast('任务不存在或已删除', true);
    return;
  }
  currentTask = await resp.json();
  updateHeader();
  setTab('log');
  loadHistory();

  // Load images (if already generated)
  await fetchImages();

  // Connect SSE — this replays history + streams live events
  connectSSE(id);
}

// ── Header ─────────────────────────────────────────────────────────────
function updateHeader() {
  const t = currentTask;
  if (!t) return;
  const el = $('task-title');
  el.textContent = 'PDF2MD · ' + t.filename;
  el.classList.remove('empty');
  $('hdr-badge').innerHTML = mkBadge(t.status);
  const dl = $('dl-btn');
  if (t.status === 'completed') {
    dl.href = `/api/tasks/${t.id}/download`;
    dl.style.display = 'flex';
  } else {
    dl.style.display = 'none';
  }
}

// ── Images ─────────────────────────────────────────────────────────────
function renderImages(state, imgs=[]) {
  const list = $('img-list');
  const cnt  = $('img-count');
  if (state === 'empty') {
    list.innerHTML = `<div class="img-empty"><i class="bi bi-file-earmark-image"></i>从右侧上传或选择<br>PDF 文件</div>`;
    cnt.textContent = '';
  } else if (state === 'loading') {
    list.innerHTML = `<div class="img-spin"><div class="spin"></div>等待图像生成...</div>`;
    cnt.textContent = '';
  } else {
    cnt.textContent = imgs.length + ' 页';
    lbImages = imgs;
    list.innerHTML = imgs.map((name, i) => `
      <div class="img-item">
        <img src="/api/tasks/${currentId}/images/${esc(name)}" loading="lazy" alt="第${i+1}页">
        <div class="img-pg">第 ${i+1} 页</div>
        <button class="img-eye" onclick="event.stopPropagation();openLightbox(${i})" title="放大查看">
          <i class="bi bi-eye"></i>
        </button>
      </div>`).join('');
  }
}

async function fetchImages() {
  if (!currentId) return;
  try {
    const resp = await fetch(`/api/tasks/${currentId}/images`);
    if (!resp.ok) return;
    const imgs = await resp.json();
    if (imgs.length > 0) renderImages('done', imgs);
  } catch {}
}

// ── Lightbox ───────────────────────────────────────────────────────────
function openLightbox(idx) {
  if (!lbImages.length) return;
  lbIndex = idx;
  $('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
  lbRender();
}
function closeLightbox() {
  $('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
function lbNav(dir) {
  lbIndex = Math.max(0, Math.min(lbImages.length - 1, lbIndex + dir));
  lbRender();
}
function lbRender() {
  const name = lbImages[lbIndex];
  $('lb-img').src = `/api/tasks/${currentId}/images/${esc(name)}`;
  $('lb-img').alt = `第 ${lbIndex + 1} 页`;
  $('lb-counter').textContent = `第 ${lbIndex + 1} 页 / 共 ${lbImages.length} 页`;
  $('lb-prev').disabled = lbIndex === 0;
  $('lb-next').disabled = lbIndex === lbImages.length - 1;
}
$('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget || e.target === $('lb-img-wrap')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!$('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

// ── Preview ────────────────────────────────────────────────────────────
async function renderPreview() {
  const body  = $('md-body');
  const empty = $('preview-empty');
  if (body.style.display !== 'none') return;  // already rendered
  try {
    const resp = await fetch(`/api/tasks/${currentId}/output`);
    if (!resp.ok) { empty.style.display='flex'; return; }
    const {content} = await resp.json();
    body.innerHTML = marked.parse(content);
    empty.style.display = 'none';
    body.style.display  = 'block';
  } catch {}
}

// ── Log ────────────────────────────────────────────────────────────────
function appendLog(html) {
  const entries = $('log-entries');
  entries.insertAdjacentHTML('beforeend', html);
  const pane = $('log-pane');
  if (autoScroll) pane.scrollTop = pane.scrollHeight;
}

function ts(iso) { return `<span class="lts">${fmtTs(iso)}</span>`; }

function handleSSE(ev) {
  const type = ev.type;

  if (type === 'task_start') {
    thinkEl = null;
    $('log-dot').style.display = 'block';
    appendLog(`<div class="le l-start">
      ${ts(ev.timestamp)}<i class="bi bi-play-fill" style="color:var(--acc);margin-right:.3rem"></i>${esc(ev.message)}
    </div>`);
    return;
  }

  if (type === 'agent_thinking') {
    if (!thinkEl) {
      const id = 'tk' + Date.now();
      appendLog(`<div class="le l-think" id="${id}">${ts(ev.timestamp)}<span class="lbl">💭</span><span class="tc"></span></div>`);
      thinkEl = $(id);
    }
    if (thinkEl) thinkEl.querySelector('.tc').textContent += ev.content;
    if (autoScroll) $('log-pane').scrollTop = $('log-pane').scrollHeight;
    return;
  }

  thinkEl = null;

  if (type === 'tool_start') {
    const inp = fmtJson(ev.input);
    appendLog(`<div class="le l-call">
      ${ts(ev.timestamp)}<span class="fn">CALL</span><span class="nm">${esc(ev.tool)}</span>
      <pre>${esc(inp)}</pre>
    </div>`);
    return;
  }

  if (type === 'tool_end') {
    const out = ev.output.length > 600 ? ev.output.slice(0, 600) + ' …[截断]' : ev.output;
    appendLog(`<div class="le l-ret">
      ${ts(ev.timestamp)}<span class="fn">RET</span><span class="nm">${esc(ev.tool)}</span>
      <pre>${esc(out)}</pre>
    </div>`);
    // Load images after pdf_to_images completes
    if (ev.tool === 'pdf_to_images') {
      try {
        const imgs = JSON.parse(ev.output);
        if (Array.isArray(imgs)) totalPages = imgs.length;
      } catch {}
      setTimeout(fetchImages, 400);
    }
    // Track describe_image calls for progress
    if (ev.tool === 'describe_image') {
      donePages++;
      if (totalPages > 0) {
        const pct = Math.min(96, Math.round(donePages / totalPages * 100));
        $('prog-fill').style.width = pct + '%';
      }
    }
    return;
  }

  if (type === 'task_complete') {
    $('log-dot').style.display = 'none';
    $('prog-fill').style.width = '100%';
    appendLog(`<div class="le l-done">
      ${ts(ev.timestamp)}<i class="bi bi-check-circle-fill" style="margin-right:.35rem"></i>转换完成！共 ${ev.page_count || '?'} 页。
    </div>`);
    // Refresh task state then switch to preview
    fetch(`/api/tasks/${currentId}`).then(r=>r.json()).then(t => {
      currentTask = t;
      updateHeader();
      fetchImages();
      renderPreview().then(() => setTab('preview'));
    });
    if (sseSource) sseSource.close();
    return;
  }

  if (type === 'task_error') {
    $('log-dot').style.display = 'none';
    appendLog(`<div class="le l-err">
      ${ts(ev.timestamp)}<i class="bi bi-x-circle-fill" style="margin-right:.35rem"></i>转换失败：${esc(ev.error)}
    </div>`);
    fetch(`/api/tasks/${currentId}`).then(r=>r.json()).then(t => {
      currentTask = t; updateHeader(); loadHistory();
    });
    if (sseSource) sseSource.close();
    return;
  }
}

// ── SSE ────────────────────────────────────────────────────────────────
function connectSSE(id) {
  if (sseSource) sseSource.close();
  sseSource = new EventSource(`/api/tasks/${id}/stream`);
  sseSource.onmessage = e => {
    try { handleSSE(JSON.parse(e.data)); } catch(err) { console.error('SSE parse error', err); }
  };
  sseSource.onerror = () => sseSource.close();

  // Detect manual scroll to pause auto-scroll
  $('log-pane').addEventListener('scroll', function() {
    autoScroll = this.scrollTop + this.clientHeight >= this.scrollHeight - 30;
  }, { passive: true });
}

// ── History ────────────────────────────────────────────────────────────
async function loadHistory() {
  let tasks;
  try {
    const r = await fetch('/api/tasks');
    tasks = await r.json();
  } catch { return; }

  const list = $('hist-list');
  if (!tasks.length) {
    list.innerHTML = '<div class="hist-empty">暂无任务<br>上传 PDF 开始转换</div>';
    return;
  }
  list.innerHTML = tasks.map(t => `
    <div class="hist-item${t.id===currentId?' active':''}" onclick="loadTask('${t.id}')">
      <i class="bi bi-file-earmark-pdf-fill hi-icon"></i>
      <div class="hi-body">
        <div class="hi-name" title="${esc(t.filename)}">${esc(t.filename)}</div>
        <div class="hi-meta">
          ${timeAgo(t.created_at)}
          ${t.page_count ? '· '+t.page_count+'页' : ''}
          ${mkBadge(t.status)}
        </div>
      </div>
      <button class="hi-del" onclick="event.stopPropagation();confirmDel('${t.id}')" title="删除">
        <i class="bi bi-trash"></i>
      </button>
    </div>`).join('');
}

// ── Upload ─────────────────────────────────────────────────────────────
const upzone = $('upzone');
const finput = $('file-input');

upzone.addEventListener('click', e => { if (e.target !== finput) finput.click(); });
upzone.addEventListener('dragover', e => { e.preventDefault(); upzone.classList.add('over'); });
upzone.addEventListener('dragleave', () => upzone.classList.remove('over'));
upzone.addEventListener('drop', e => {
  e.preventDefault(); upzone.classList.remove('over');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});
finput.addEventListener('change', () => { if (finput.files[0]) doUpload(finput.files[0]); });

async function doUpload(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showToast('只支持 .pdf 格式', true); return;
  }
  upzone.classList.add('busy');
  $('up-prog').style.display = 'block';
  $('up-msg').textContent = `上传 ${file.name}…`;

  try {
    const form = new FormData();
    form.append('file', file);
    const resp = await fetch('/api/tasks', { method:'POST', body:form });
    if (!resp.ok) throw new Error((await resp.json()).detail || '上传失败');
    const task = await resp.json();
    $('up-msg').textContent = '上传成功，开始处理…';
    await loadTask(task.id);
  } catch(e) {
    showToast('上传失败：' + e.message, true);
  } finally {
    upzone.classList.remove('busy');
    $('up-prog').style.display = 'none';
    finput.value = '';
  }
}

// ── Delete ─────────────────────────────────────────────────────────────
function confirmDel(id) {
  deleteTarget = id;
  $('del-overlay').classList.add('show');
}
function closeModal() {
  $('del-overlay').classList.remove('show');
  deleteTarget = null;
}
$('del-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
$('del-confirm').addEventListener('click', async () => {
  if (!deleteTarget) return;
  await fetch(`/api/tasks/${deleteTarget}`, { method:'DELETE' });
  closeModal();
  showToast('任务已删除');
  if (deleteTarget === currentId) {
    currentId = null; currentTask = null;
    if (sseSource) { sseSource.close(); sseSource = null; }
    $('task-title').textContent = '选择或上传 PDF 开始转换';
    $('task-title').classList.add('empty');
    $('hdr-badge').innerHTML = '';
    $('dl-btn').style.display = 'none';
    $('log-entries').innerHTML = '';
    $('log-welcome').style.display = 'flex';
    renderImages('empty');
    $('prog-fill').style.width = '0%';
    window.history.pushState({}, '', '/');
  }
  loadHistory();
});

// ── Init ───────────────────────────────────────────────────────────────
(async () => {
  await loadHistory();
  const id = new URLSearchParams(window.location.search).get('id');
  if (id) loadTask(id);
})();

// Auto-refresh history when tasks are in progress
setInterval(() => {
  if (document.querySelector('.s-processing')) loadHistory();
}, 6000);

window.addEventListener('popstate', () => {
  const id = new URLSearchParams(window.location.search).get('id');
  if (id) loadTask(id); else { renderImages('empty'); }
});
</script>
</body>
</html>
